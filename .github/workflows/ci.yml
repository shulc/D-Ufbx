name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install D (LDC)
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      # CMake is preinstalled on all GitHub-hosted runners.
      - name: Build static library
        run: dub build

      - name: Build + run example
        run: dub run -c load_fbx
